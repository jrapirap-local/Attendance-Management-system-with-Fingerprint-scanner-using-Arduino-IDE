{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white shadow-lg rounded-2xl p-8 max-w-md w-full text-center">
        <img src="{% static 'image/logoams.png' %}" alt="Logo" class="mx-auto w-20 h-20 rounded-full mb-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Are you sure you want to logout?</h1>
        <p class="text-gray-600 mb-6">You will need to log in again to access the system.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit"
                class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-500 transition mr-2">
                Logout
            </button>
            <a href="{% url 'dashboard' %}" 
               class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition">
                Cancel
            </a>
        </form>
    </div>

</body>
</html>
