{% load static %}
{% block sidebar %}
<div id="sidebar" class="w-64 h-screen sticky top-0 bg-green-900 text-green-100 flex flex-col">
    <!-- Menu -->
    <div class="flex-1 px-4 py-4 space-y-2 overflow-y-auto">
        <a href="{% url 'dashboard' %}" 
           class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">
           Dashboard
        </a>

        <a href="{% url 'news' %}" 
           class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">
           News
        </a>

        <!-- Instructor Dropdown -->
        <div>
            <button onclick="toggleDropdown('instructorMenu')" 
                    class="w-full text-left px-4 py-2 rounded-lg hover:bg-green-800 transition flex justify-between items-center">
                Instructor
                <span>▾</span>
            </button>

            <div id="instructorMenu" class="hidden pl-6 mt-1 space-y-1">
                <a href="{% url 'instructornew' %}" class="block px-4 py-2 rounded hover:bg-green-800">Add Instructor</a>
                <a href="{% url 'instructor' %}" class="block px-4 py-2 rounded hover:bg-green-800">Manage Instructor</a>
                <a href="{% url 'instructor-attendance' %}" class="block px-4 py-2 rounded hover:bg-green-800">Instructor Attendance & Schedule</a>
                <a href="{% url 'instructor-dtr' %}" class="block px-4 py-2 rounded hover:bg-green-800">Daily Time Records</a>
            </div>
        </div>

        <!-- Comlab Dropdown -->
        <div>
            <button onclick="toggleDropdown('comlabMenu')" 
                    class="w-full text-left px-4 py-2 rounded-lg hover:bg-green-800 transition flex justify-between items-center">
                Comlab
                <span>▾</span>
            </button>

            <div id="comlabMenu" class="hidden pl-6 mt-1 space-y-1">
                <a href="#" class="block px-4 py-2 rounded hover:bg-green-800">Add Comlab</a>
                <a href="{% url 'instructor' %}" class="block px-4 py-2 rounded hover:bg-green-800">Manage Comlab</a>
            </div>
        </div>

        <a href="#" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Profile</a>

        <!-- Settings Dropdown -->
        <div>
            <button onclick="toggleDropdown('settingsMenu')" 
                    class="w-full text-left px-4 py-2 rounded-lg hover:bg-green-800 transition flex justify-between items-center">
                Settings
                <span>▾</span>
            </button>

            <div id="settingsMenu" class="hidden pl-6 mt-1 space-y-1">
                <a href="#" class="block px-4 py-2 rounded hover:bg-green-800">Profile & Security</a>
                <a href="#" class="block px-4 py-2 rounded hover:bg-green-800">Database Management</a>
            </div>
        </div>
    </div>

    <!-- Logout -->
    <div class="p-4 border-t border-green-700 flex-shrink-0">
        <a href="#" class="block text-center px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg transition">Logout</a>
    </div>

</div>

<script>
function toggleDropdown(id){
    const menu = document.getElementById(id);
    menu.classList.toggle("hidden");
}
</script>

{% endblock %}
