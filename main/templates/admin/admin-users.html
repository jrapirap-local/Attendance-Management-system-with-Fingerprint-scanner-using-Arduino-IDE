{% extends 'builder.html' %}
{% block page %}admin-users{% endblock %}
{% block content %}

<main class="p-4 md:p-6 space-y-6">
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Admin Users</h1>
            <p class="text-sm text-gray-500">Manage administrator accounts</p>
        </div>

        <button onclick="openCreateModal()"
            class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-500 transition">
            + Create Admin
        </button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow border overflow-x-auto">
        <table class="min-w-full text-sm text-gray-700">
            <thead class="bg-gray-50 text-xs uppercase text-gray-500">
                <tr>
                    <th class="px-4 py-3 text-left">Username</th>
                    <th class="px-4 py-3 text-left">Name</th>
                    <th class="px-4 py-3 text-left">Email</th>
                    <th class="px-4 py-3 text-left">Role</th>
                    <th class="px-4 py-3 text-center">Actions</th>
                </tr>
            </thead>
            <tbody id="adminTable" class="divide-y">
                <tr>
                    <td colspan="5" class="text-center py-6 text-gray-400">Loading users...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Create Admin Modal -->
<div id="createAdminModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-semibold mb-6 text-gray-800">Create Admin User</h2>

        <form id="createAdminForm" class="space-y-5">

            <!-- Username -->
            <div class="flex flex-col">
                <label for="user_name" class="text-gray-600 text-sm mb-1">Username</label>
                <input type="text" id="user_name" name="user_name" placeholder="Enter username" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- First Name -->
            <div class="flex flex-col">
                <label for="first_name" class="text-gray-600 text-sm mb-1">First Name</label>
                <input type="text" id="first_name" name="first_name" placeholder="Enter first name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Last Name -->
            <div class="flex flex-col">
                <label for="last_name" class="text-gray-600 text-sm mb-1">Last Name</label>
                <input type="text" id="last_name" name="last_name" placeholder="Enter last name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Email -->
            <div class="flex flex-col">
                <label for="email" class="text-gray-600 text-sm mb-1">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Password -->
            <div class="flex flex-col">
                <label for="password" class="text-gray-600 text-sm mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="closeCreateModal()"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-500 transition">Save</button>
            </div>

        </form>
    </div>
</div>

<!-- Edit Admin Modal -->
<div id="editAdminModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-semibold mb-6 text-gray-800">Edit Admin User</h2>

        <form id="editAdminForm" class="space-y-5">

            <input type="hidden" name="id" id="editAdminId">

            <!-- Username (disabled) -->
            <div class="flex flex-col">
                <label for="editUserName" class="text-gray-600 text-sm mb-1">Username</label>
                <input type="text" id="editUserName" name="user_name" placeholder="User Name" disabled
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 bg-gray-100 cursor-not-allowed">
            </div>

            <!-- First Name -->
            <div class="flex flex-col">
                <label for="editFirstName" class="text-gray-600 text-sm mb-1">First Name</label>
                <input type="text" id="editFirstName" name="first_name" placeholder="Enter first name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Last Name -->
            <div class="flex flex-col">
                <label for="editLastName" class="text-gray-600 text-sm mb-1">Last Name</label>
                <input type="text" id="editLastName" name="last_name" placeholder="Enter last name" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Email -->
            <div class="flex flex-col">
                <label for="editEmail" class="text-gray-600 text-sm mb-1">Email</label>
                <input type="email" id="editEmail" name="email" placeholder="Enter email" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Password -->
            <div class="flex flex-col">
                <label for="editPassword" class="text-gray-600 text-sm mb-1">Password</label>
                <input type="password" id="editPassword" name="password" placeholder="Leave blank to keep current"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition">
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" onclick="closeEditModal()"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">Cancel</button>
                <button type="submit"
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-500 transition">Save</button>
            </div>

        </form>
    </div>
</div>

<script>
/* Modal Controls */
function openCreateModal() {
    document.getElementById('createAdminModal').classList.remove('hidden');
    document.getElementById('createAdminModal').classList.add('flex');
}

function closeCreateModal() {
    document.getElementById('createAdminModal').classList.add('hidden');
    document.getElementById('createAdminModal').classList.remove('flex');
}

function openEditModal(user) {
    document.getElementById('editAdminId').value = user.id;
    document.getElementById('editUserName').value = user.username;
    document.getElementById('editFirstName').value = user.first_name;
    document.getElementById('editLastName').value = user.last_name;
    document.getElementById('editEmail').value = user.email;
    document.getElementById('editPassword').value = '';
    document.getElementById('editAdminModal').classList.remove('hidden');
    document.getElementById('editAdminModal').classList.add('flex');
}

function closeEditModal() {
    document.getElementById('editAdminModal').classList.add('hidden');
    document.getElementById('editAdminModal').classList.remove('flex');
}

/* Load Admins */
function loadAdmins() {
    const table = document.getElementById('adminTable');
    table.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-gray-400">Loading users...</td></tr>`;

    fetch('/api/admin-users/')
        .then(res => res.json())
        .then(data => {
            table.innerHTML = '';
            if (!data.users.length) {
                table.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-gray-400">No admin users found</td></tr>`;
                return;
            }

            data.users.forEach(user => {
                if(user.id==`{{request.user.id}}`){
                    table.innerHTML += `
                    <tr class="hover:bg-gray-50 disabled" disabled>
                        <td class="px-4 py-3">${user.username}</td>
                        <td class="px-4 py-3">${user.first_name} ${user.last_name}</td>
                        <td class="px-4 py-3">${user.email}</td>
                        <td class="px-4 py-3">
                            <span class="bg-red-100 text-red-700 px-2 py-1 text-xs rounded">Admin</span>
                        </td>
                        <td class="px-4 py-3 text-center space-x-2">
                            
                        </td>
                    </tr>
                    `;
                } else {
                    table.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3">${user.username}</td>
                        <td class="px-4 py-3">${user.first_name} ${user.last_name}</td>
                        <td class="px-4 py-3">${user.email}</td>
                        <td class="px-4 py-3">
                            <span class="bg-red-100 text-red-700 px-2 py-1 text-xs rounded">Admin</span>
                        </td>
                        <td class="px-4 py-3 text-center space-x-2">
                            <button onclick='openEditModal(${JSON.stringify(user)})' class="text-blue-600">Edit</button>
                            <button onclick="deleteUser(${user.id})" class="text-red-600">Delete</button>
                        </td>
                    </tr>
                    `;                    
                }


            });
        })
        .catch(() => {
            table.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-red-500">Failed to load users</td></tr>`;
        });
}

/* Form Submission */
document.getElementById('createAdminForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;

    fetch('/api/create-admin/', {
        method: 'POST',
        headers: {"X-CSRFToken": getCSRFToken()},
        body: new FormData(this)
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) { showError(data.error); return; }
        Swal.fire({ icon: 'success', title: 'Created!', text: 'Admin created successfully.', timer: 1500, showConfirmButton: false });
        this.reset(); closeCreateModal(); loadAdmins();
    })
    .finally(() => btn.disabled = false);
});

document.getElementById('editAdminForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('editAdminId').value;
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;

    fetch(`/api/admin-update/${id}/`, {
        method: 'POST',
        headers: {"X-CSRFToken": getCSRFToken()},
        body: new FormData(this)
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) { showError(data.error); return; }
        Swal.fire({ icon: 'success', title: 'Updated!', text: 'Admin updated successfully.', timer: 1500, showConfirmButton: false });
        closeEditModal(); loadAdmins();
    })
    .finally(() => btn.disabled = false);
});

/* Delete Admin */
function deleteUser(id) {
    Swal.fire({
        title: 'Are you sure?', text: "This admin will be permanently deleted.", icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#16a34a', cancelButtonColor: '#d33',
        confirmButtonText: 'Yes, delete it', cancelButtonText: 'Cancel'
    }).then(result => {
        if (!result.isConfirmed) return;
        fetch(`/api/admin-delete/${id}/`, { method: 'POST', headers: {"X-CSRFToken": getCSRFToken()} })
        .then(res => res.json())
        .then(data => {
            if (data.error) showError(data.error);
            else { Swal.fire({ icon: 'success', title: 'Deleted!', text: 'Admin has been removed.', timer: 1500, showConfirmButton: false }); loadAdmins(); }
        });
    });
}

loadAdmins();
</script>

{% endblock %}
