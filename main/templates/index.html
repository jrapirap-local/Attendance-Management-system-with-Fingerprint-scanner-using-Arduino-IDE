<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body{
          background: linear-gradient(135deg, #001a00, #004d00, #007f00);
          color: rgba(41, 40, 40, 1);
          font-family: system-ui, -apple-system, "Segoe UI", Roboto,
                      Helvetica, Arial, sans-serif;
          font-size: 16px;
          line-height: 1.6;
          color: #222;
          margin:0;
          padding:0;
        }

        /* Landing section */
        #landing{
            flex:1;
            background:rgba(255,255,255,1);
            backdrop-filter:blur(10px);
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.6);
            text-align:center;
        } 

        /* Navigation bar */
        header{
            background:#333;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            margin-left:20px;
            text-decoration:none;
        }

        nav a:hover{
            color:#00bfff;
        }

        .hero{
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: white;
            flex-direction: column;
        }

        .hero h1{
            font-size:40px;
        }

        .hero p{
            font-size:18px;
            color:#555;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#007BFF;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        /* Footer */
        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

<body>
<div id="landing">
  <header>
      <h2>OMSUFB</h2>

      <nav>
          <a href="#">Home</a>
          <a href="{% url 'news' %}">News</a>
          <a href="#">Organizational Chart</a>
          <a href="#">About Us</a>
          <a href="{% url 'login' %}">Login</a>
      </nav>
  </header>

  <section class="hero">
      <h1>Welcome to My Website</h1>
      <p>This is a simple landing page built with HTML.</p>
      <a href="{% url 'login' %}" class="btn">Get Started</a>
  </section>

  <footer>
      <p>© 2026 My Website</p>
  </footer>

</div>

</body>
</html>
