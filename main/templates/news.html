{% extends 'builder2.html' %}
{% load static %}

{% block content %}
<main class="min-h-screen bg-gradient-to-br from-green-950 via-green-800 to-green-600 py-6 px-4 sm:px-6">

    <!-- Back Button -->
    <div class="max-w-2xl mx-auto mb-6">
        <a href="{% url 'login' %}" 
           class="inline-flex items-center gap-2 text-sm text-gray-200 hover:text-gray-300 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Login
        </a>
    </div>

    <div class="max-w-2xl mx-auto">
        <!-- Pinned -->
        <div id="pinnedPosts" class="space-y-4 mb-6"></div>

        <!-- Feed -->
        <div id="postList" class="space-y-4"></div>

        <div id="loadTrigger" class="h-10"></div>
    </div>

</main>
<script>
/* =========================
   STATE
========================= */
const postList = document.getElementById("postList");
const trigger = document.getElementById("loadTrigger");

let currentPage = 1;
let isLoading = false;
let hasMore = true;
let latestPostId = 0;

const loadedPostIds = new Set();

const MAX_POSTS = 50;

/* =========================
   FETCH HELPER
========================= */
async function fetchJSON(url, options = {}) {
    try {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error("Request failed");
        return await res.json();
    } catch (err) {
        console.error(err);
        return null;
    }
}

/* =========================
   RENDER POST
========================= */
function renderPost(post, prepend = false) {

    // 🚫 Skip private posts
    if (post.is_private) return;

    if (loadedPostIds.has(post.id)) return;
    loadedPostIds.add(post.id);

    if (post.id > latestPostId) {
        latestPostId = post.id;
    }

    const div = document.createElement("div");

    div.className = `
        post-item w-full bg-white rounded-2xl px-5 py-4
        shadow-sm border border-gray-100
        hover:shadow-md transition
        ${post.is_pinned ? "ring-1 ring-blue-400" : ""}
        ${post.is_announcement ? "ring-1 ring-red-400" : ""}
    `;

    div.innerHTML = `
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <img src="${post.profile_pic || '/static/image/maleSil.jpg'}"
                    class="w-10 h-10 rounded-full object-cover">

                <div>
                    <p class="text-sm font-semibold text-gray-800">${post.created_by}</p>
                    <p class="text-xs text-gray-400">${post.created_at}</p>
                </div>
            </div>
        </div>

        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line">
            ${post.body}
        </p>

        ${post.image ? `
            <img src="${post.image}" 
                class="mt-4 rounded-xl max-h-80 w-full object-cover">
        ` : ""}

        <div class="flex items-center gap-4 mt-4 pt-3 border-t border-gray-100">
            <button onclick="toggleLike(${post.id}, this)"
                class="flex items-center gap-1 text-xs text-gray-500 hover:text-gray-800 transition">
                👍 <span>${post.likes_count}</span>
            </button>
        </div>
    `;

    if (post.is_pinned) {
        document.getElementById("pinnedPosts").prepend(div);
    } else {
        prepend ? postList.prepend(div) : postList.appendChild(div);
    }
}
/* =========================
   LOAD MORE (INFINITE SCROLL)
========================= */
async function loadMorePosts() {
    if (isLoading || !hasMore) return;

    isLoading = true;
    showSkeletons();

    const data = await fetchJSON(`/posts/?page=${currentPage}`);

    removeSkeletons();

    if (!data || !data.posts || data.posts.length === 0) {
        hasMore = false;
        showEndMessage();
        return;
    }

    data.posts.forEach(post => {
        if (post.is_pinned) {
            renderPost(post);
        } else {
            renderPost(post);
        }
    });

    trimPosts();

    if (data.posts.length < 5) {
        hasMore = false;
        showEndMessage();
    }

    currentPage++;
    isLoading = false;
}

/* =========================
   REAL-TIME POSTS
========================= */
async function fetchNewPosts() {
    const data = await fetchJSON(`/posts/new/?latest_id=${latestPostId}`);

    if (!data || !data.posts || data.posts.length === 0) return;

    let count = 0;

    data.posts.reverse().forEach(post => {
        if (!loadedPostIds.has(post.id)) {
            renderPost(post, true);
            trimPosts();
            count++;
        }
    });
    

    if (count > 0) showNewPostIndicator(count);
}

setInterval(fetchNewPosts, 5000);

/* =========================
   LIKE
========================= */
async function toggleLike(postId, btn) {
    const data = await fetchJSON(`/like/${postId}/`, {
        method: "POST",
        headers: { "X-CSRFToken": getCSRF() }
    });

    if (!data) return;

    btn.querySelector("span").innerText = data.likes_count;
}

/* =========================
   UI HELPERS
========================= */
function showNewPostIndicator(count) {
    let bar = document.getElementById("newPostBar");

    if (!bar) {
        bar = document.createElement("div");
        bar.id = "newPostBar";
        bar.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-4 py-2 rounded-full shadow cursor-pointer z-50";

        bar.onclick = () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
            bar.remove();
        };

        document.body.appendChild(bar);
    }

    bar.innerText = `${count} new post(s) ↑`;
}

function showSkeletons(count = 3) {
    for (let i = 0; i < count; i++) {
        const div = document.createElement("div");
        div.className = "skeleton-item bg-white p-4 mb-4 rounded-xl animate-pulse";
        div.innerHTML = `<div class="h-3 bg-gray-300 mb-2"></div>
                         <div class="h-3 bg-gray-200 w-2/3"></div>`;
        postList.appendChild(div);
    }
}

function trimPosts() {
    const posts = document.querySelectorAll("#postList .post-item");

    if (posts.length <= MAX_POSTS) return;

    const excess = posts.length - MAX_POSTS;

    for (let i = 0; i < excess; i++) {
        posts[i].remove();
    }
}

function removeSkeletons() {
    document.querySelectorAll(".skeleton-item").forEach(el => el.remove());
}

function showEndMessage() {
    if (document.getElementById("endMessage")) return;

    const div = document.createElement("div");
    div.id = "endMessage";
    div.className = "text-center my-6 text-gray-400 text-sm";
    div.innerHTML = "You're all caught up 🎉";

    postList.appendChild(div);
}

function getCSRF() {
    return document.querySelector("[name=csrfmiddlewaretoken]").value;
}

/* =========================
   SCROLL OBSERVER
========================= */
const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
        loadMorePosts();
    }
});

observer.observe(trigger);

/* =========================
   INIT
========================= */
loadMorePosts();

</script>

{% endblock %}
